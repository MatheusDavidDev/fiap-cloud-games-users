version: "3.9"

name: "fgc-users-docker"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: FCG-users-sql-database
    ports:
      - "1432:1433"
    environment:
      SA_PASSWORD: "Sql@123456789"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqlserver_data: