apiVersion: apps/v1
kind: Deployment

metadata:

  name: users-db


spec:

  replicas: 1


  selector:

    matchLabels:

      app: users-db


  template:

    metadata:

      labels:

        app: users-db


    spec:

      containers:

      - name: users-db


        image: mcr.microsoft.com/mssql/server:2025-latest


        ports:

        - containerPort: 1433


        env:

        - name: ACCEPT_EULA

          value: "Y"


        - name: MSSQL_PID

          value: "Developer"


        - name: SA_PASSWORD

          valueFrom:

            secretKeyRef:

              name: users-secret

              key: SA_PASSWORD


        resources:

          limits:

            memory: "1500Mi"


          requests:

            memory: "1000Mi"


        volumeMounts:

        - name: users-storage

          mountPath: /var/opt/mssql



      volumes:

      - name: users-storage

        persistentVolumeClaim:

          claimName: users-pvc