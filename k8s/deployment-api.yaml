apiVersion: apps/v1
kind: Deployment

metadata:
  name: users-api

spec:

  replicas: 1

  selector:
    matchLabels:
      app: users-api

  template:

    metadata:
      labels:
        app: users-api

    spec:

      containers:

      - name: users-api

        image: users-api:latest
        imagePullPolicy: Never

        ports:

        - containerPort: 8080


        resources:

          limits:
            memory: "512Mi"

          requests:
            memory: "256Mi"


        envFrom:

        - configMapRef:
            name: users-config

        - secretRef:
            name: users-secret