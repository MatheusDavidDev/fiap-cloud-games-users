version: "3.9"

name: "fgc-users-docker"
services:

  users-db:
    image: mcr.microsoft.com/mssql/server:2025-latest

    container_name: fcg-users-sql-db
    ports:
      - "1432:1433"

    deploy:
      resources:
        limits:
          memory: 1500M     
        reservations:
          memory: 1000M
          
    environment:
      SA_PASSWORD: "Sql@123456789"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"

    volumes:
      - users-data:/var/opt/mssql
      
    restart: unless-stopped

    networks:
      - fcg-network

  users-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: fcg-users-api

    ports:
      - "5001:8080"

    depends_on:
      - users-db

    deploy:
      resources:
        limits:
          memory: 512M      
        reservations:
          memory: 256M 

    environment:
      #ConnectionStrings
      ConnectionStrings__DefaultConnection: "Server=users-db;Database=Usuarios;User Id=sa;Password=Sql@123456789;TrustServerCertificate=True"

      #JWT
      Jwt__Key: "uma-chave-grande-e-secreta-para-jwt"

      # RabbitMQ
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__VirtualHost: "/"
      RabbitMQ__Username: "fcgrabbtmq"
      RabbitMQ__Password: "fcgrabbtmq"

    networks:
      - fcg-network

volumes:
  users-data:


networks:
  fcg-network:
    external: true